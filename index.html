<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Huddle — find a time that works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF9FB;
    --card:#FFFFFF;
    --pink:#E24E76;
    --pink-dark:#C43862;
    --pink-soft:#FCE7EE;
    --pink-soft2:#FBEEF3;
    --pink-line:#F4D2DE;
    --text:#2B222A;
    --muted:#9A8B93;
    --success:#3FA772;
    --success-soft:#E8F6EF;
    --radius:14px;
    --shadow:0 2px 14px rgba(196,56,98,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}
  h1,h2,h3,.brand{font-family:'Outfit',system-ui,sans-serif;}
  #app{max-width:760px;margin:0 auto;padding:22px 16px 60px;}
  .view{animation:fadeSlide .38s ease;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.12);}100%{transform:scale(1);}}
  @keyframes pulseIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
  .brand-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .brand-dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--pink-dark));flex:none;}
  .brand{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.02em;}
  .tagline{color:var(--muted);font-size:14px;margin:0 0 28px;}
  .card{background:var(--card);border:1px solid var(--pink-line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
  .card h2{margin:0 0 4px;font-size:17px;}
  .card .sub{color:var(--muted);font-size:13px;margin:0 0 16px;}
  label{display:block;font-size:13px;font-weight:600;color:var(--text);margin:14px 0 6px;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=date],input[type=number],select{
    width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--pink-line);
    font-size:14.5px;font-family:inherit;background:#fff;color:var(--text);outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(226,78,118,0.12);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  button{
    font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:600;font-size:14.5px;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  }
  button:active{transform:scale(0.97);}
  .btn-primary{background:var(--pink);color:#fff;padding:12px 20px;width:100%;box-shadow:0 3px 10px rgba(226,78,118,0.28);}
  .btn-primary:hover{background:var(--pink-dark);}
  .btn-secondary{background:var(--pink-soft);color:var(--pink-dark);padding:12px 20px;width:100%;}
  .btn-secondary:hover{background:var(--pink-line);}
  .btn-ghost{background:transparent;color:var(--muted);padding:8px 12px;font-size:13px;}
  .btn-ghost:hover{color:var(--pink-dark);}
  .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
  .choice{border:1.5px solid var(--pink-line);border-radius:var(--radius);padding:22px 16px;text-align:center;background:#fff;cursor:pointer;transition:all .15s;}
  .choice:hover{border-color:var(--pink);background:var(--pink-soft2);transform:translateY(-2px);}
  .choice .ico{font-size:26px;margin-bottom:8px;}
  .choice .t{font-weight:700;font-size:15px;}
  .choice .d{color:var(--muted);font-size:12.5px;margin-top:4px;}

  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:18px;}

  .banner .time{font-size:20px;font-weight:700;margin:4px 0 2px;font-family:'Outfit';}
  .banner .miss{font-size:12.5px;opacity:.9;}
  .member-list{list-style:none;margin:0;padding:0;}

  .member-list li:last-child{border-bottom:none;}
  .check{width:20px;height:20px;border-radius:50%;background:var(--success-soft);color:var(--success);
    display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;animation:pop .3s ease;}
  .member-name{font-weight:600;}
  .member-tz{color:var(--muted);font-size:12px;margin-left:auto;}
  .grid-wrap{overflow-x:auto;border-radius:10px;}
  table.slotgrid{border-collapse:collapse;width:100%;min-width:560px;}
  table.slotgrid th{font-size:11.5px;color:var(--muted);font-weight:600;padding:4px 3px;text-align:center;}
  table.slotgrid td{padding:2px;}
  .slot-cell{width:100%;height:26px;border-radius:6px;background:var(--pink-soft2);border:1px solid var(--pink-line);
    cursor:pointer;transition:background .12s, transform .08s;user-select:none;touch-action:none;}
  body.dragging, body.dragging *{user-select:none !important;}
  .slot-cell:hover{background:var(--pink-line);}

  .result-row .rm{font-size:12px;color:var(--muted);margin-top:2px;}
  .result-row .rc{font-size:12.5px;color:var(--success);font-weight:700;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;

    animation:pulseIn .25s ease;z-index:50;}
  .msg-err{color:#B3273F;font-size:13px;margin-top:8px;}
  .divider{height:1px;background:var(--pink-line);margin:18px 0;}
  .small-btn{padding:8px 14px;font-size:13px;}
  a.linklike{color:var(--pink-dark);cursor:pointer;font-weight:600;}
  .radio-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1.5px solid var(--pink-line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}

  .codeblock{background:#2B222A;color:#F6E4EB;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;

  .step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;
    background:var(--pink);color:#fff;font-size:12px;font-weight:700;flex:none;margin-right:8px;}
  .step{display:flex;align-items:flex-start;margin-bottom:14px;}
  .step .step-body{flex:1;font-size:13.5px;line-height:1.55;}
  .step .step-body b{color:var(--text);}
  .badge-warn{display:inline-block;background:#FDF0E4;color:#95591C;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:10px;}

<script>

function isFirebaseConfigured(){
  return firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('YOUR_')
      && firebaseConfig.databaseURL && !firebaseConfig.databaseURL.includes('YOUR_');
}
let db = null;
let authReadyPromise = null;
function initFirebase(){
  if(db) return true;
  if(!isFirebaseConfigured()) return false;
  try{
    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    authReadyPromise = firebase.auth().signInAnonymously()
      .catch(e=>{ console.error('Anonymous sign-in failed', e); });
    return true;
  }catch(e){ console.error('Firebase init failed', e); return false; }
}
async function ensureAuthReady(){ if(authReadyPromise) await authReadyPromise; }

/* ---------------- constants ---------------- */
const TIMEZONES = [
  {tz:'Pacific/Honolulu',label:'Honolulu (HST)'},{tz:'America/Anchorage',label:'Anchorage (AKT)'},
  {tz:'America/Los_Angeles',label:'Los Angeles (PT)'},{tz:'America/Denver',label:'Denver (MT)'},
  {tz:'America/Phoenix',label:'Phoenix (MST, no DST)'},{tz:'America/Chicago',label:'Chicago (CT)'},
  {tz:'America/New_York',label:'New York (ET)'},{tz:'America/Sao_Paulo',label:'São Paulo (BRT)'},
  {tz:'America/Mexico_City',label:'Mexico City (CT)'},{tz:'America/Bogota',label:'Bogotá (COT)'},
  {tz:'Atlantic/Reykjavik',label:'Reykjavik (GMT)'},{tz:'Europe/London',label:'London (GMT/BST)'},
  {tz:'Europe/Lisbon',label:'Lisbon (WET)'},{tz:'Europe/Madrid',label:'Madrid (CET)'},
  {tz:'Europe/Paris',label:'Paris (CET)'},{tz:'Europe/Berlin',label:'Berlin (CET)'},
  {tz:'Europe/Rome',label:'Rome (CET)'},{tz:'Europe/Amsterdam',label:'Amsterdam (CET)'},
  {tz:'Europe/Warsaw',label:'Warsaw (CET)'},{tz:'Europe/Athens',label:'Athens (EET)'},
  {tz:'Europe/Helsinki',label:'Helsinki (EET)'},{tz:'Europe/Moscow',label:'Moscow (MSK)'},
  {tz:'Africa/Cairo',label:'Cairo (EET)'},{tz:'Africa/Johannesburg',label:'Johannesburg (SAST)'},
  {tz:'Asia/Jerusalem',label:'Jerusalem (IST)'},{tz:'Asia/Dubai',label:'Dubai (GST)'},
  {tz:'Asia/Karachi',label:'Karachi (PKT)'},{tz:'Asia/Kolkata',label:'Mumbai/Delhi (IST)'},
  {tz:'Asia/Dhaka',label:'Dhaka (BST)'},{tz:'Asia/Bangkok',label:'Bangkok (ICT)'},
  {tz:'Asia/Singapore',label:'Singapore (SGT)'},{tz:'Asia/Shanghai',label:'Beijing/Shanghai (CST)'},
  {tz:'Asia/Hong_Kong',label:'Hong Kong (HKT)'},{tz:'Asia/Tokyo',label:'Tokyo (JST)'},
  {tz:'Asia/Seoul',label:'Seoul (KST)'},{tz:'Australia/Perth',label:'Perth (AWST)'},
  {tz:'Australia/Adelaide',label:'Adelaide (ACST)'},{tz:'Australia/Sydney',label:'Sydney (AEST/AEDT)'},
  {tz:'Pacific/Auckland',label:'Auckland (NZST/NZDT)'}
];
const detectedTz = (()=>{ try{return Intl.DateTimeFormat().resolvedOptions().timeZone;}catch(e){return 'UTC';} })();

/* ---------------- state ---------------- */
let session = {
  view: isFirebaseConfigured() ? 'home' : 'setup',
  name:'', code:'', tz:detectedTz,
  meta:null, members:[], mySlots:new Set(),
  hourStart:8, hourEnd:20, stepMinutes:60, roomName:'',
  err:'', busy:false
};
if(isFirebaseConfigured()) initFirebase();

/* ---------------- helpers ---------------- */
function normName(n){ return (n||'').trim().toLowerCase().replace(/\s+/g,' '); }
function genCode(){ const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
// Firebase Realtime Database keys can't contain . # $ [ ] / — normalized names are
// already lowercase+trimmed, but strip anything illegal just in case.
function safeKey(n){ return normName(n).replace(/[.#$\[\]\/]/g,'_') || 'anon'; }

function getOffsetMinutes(tz, date){
  const dtf = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const parts = dtf.formatToParts(date); const map={};
  parts.forEach(p=>{ if(p.type!=='literal') map[p.type]=parseInt(p.value,10); });
  let hour = map.hour; if(hour===24) hour=0;
  const asUTC = Date.UTC(map.year, map.month-1, map.day, hour, map.minute, map.second||0);
  return (asUTC - date.getTime())/60000;
}
function addDaysToYMD(y,m,d,days){
  const dt = new Date(Date.UTC(y,m-1,d)); dt.setUTCDate(dt.getUTCDate()+days);
  return {y:dt.getUTCFullYear(), m:dt.getUTCMonth()+1, d:dt.getUTCDate()};
}
function localToUTCISO(y,m,d,hour,minute,tz){
  let guess = new Date(Date.UTC(y,m-1,d,hour,minute,0));
  const offset = getOffsetMinutes(tz, guess); // minutes: local = utc + offset
  const utcMillis = guess.getTime() - offset*60000;
  return new Date(utcMillis).toISOString();
}
function todayISODate(){
  const now = new Date();
  const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function parseISODate(str){
  const [y,m,d] = str.split('-').map(x=>parseInt(x,10));
  return {y,m,d};
}
function formatLocal(iso, tz){
  const dt = new Date(iso);
  const wd = new Intl.DateTimeFormat(undefined,{timeZone:tz,weekday:'short',month:'short',day:'numeric'}).format(dt);
  const tm = new Intl.DateTimeFormat(undefined,{timeZone:tz,hour:'numeric',minute:'2-digit'}).format(dt);
  return `${wd}, ${tm}`;
}
function tzLabel(tz){ const f=TIMEZONES.find(t=>t.tz===tz); return f?f.label:tz; }
function isoKey(iso){ return iso.replace(/[.#$\[\]\/:]/g,'_'); } // Firebase keys can't hold ":" either

/* ---------------- storage layer (Firebase Realtime Database) ---------------- */
async function loadMeta(code){
  try{ const snap = await db.ref('rooms/'+code+'/meta').once('value'); return snap.exists()? snap.val() : null; }
  catch(e){ console.error(e); return null; }
}
async function saveMetaRaw(code, meta){
  try{ await db.ref('rooms/'+code+'/meta').set(meta); return true; }
  catch(e){ console.error(e); return false; }
}
// Transaction-based read-modify-write — safer than a plain read-then-write when
// two people vote or finalize at nearly the same moment.
async function updateMeta(code, mutateFn){
  try{
    const res = await db.ref('rooms/'+code+'/meta').transaction(current=>{
      if(current===null) return current; // abort if room vanished
      return mutateFn(current);
    });
    return (res && res.committed) ? res.snapshot.val() : await loadMeta(code);
  }catch(e){ console.error(e); return await loadMeta(code); }
}
async function loadMembers(code){
  try{
    const snap = await db.ref('rooms/'+code+'/members').once('value');
    if(!snap.exists()) return [];
    return Object.values(snap.val());
  }catch(e){ console.error(e); return []; }
}
async function saveMember(code, normKey, data){
  try{ await db.ref('rooms/'+code+'/members/'+safeKey(normKey)).set(data); return true; }
  catch(e){ console.error(e); return false; }
}

// Live sync: replaces polling entirely. Firebase pushes updates the instant
// any member (anywhere) changes the room, so everyone's view stays current
// without refresh calls or blinking.
let roomRef = null;
function startLiveSync(code){
  stopLiveSync();
  roomRef = db.ref('rooms/'+code);
  roomRef.on('value', snapshot=>{
    if(!snapshot.exists()) return;
    const val = snapshot.val();
    if(val.meta) session.meta = val.meta;
    session.members = val.members ? Object.values(val.members) : [];
    patchDashboard();
  });
}
function stopLiveSync(){ if(roomRef){ roomRef.off(); roomRef=null; } }

/* ---------------- business logic ---------------- */
function computeBest(members){
  if(!members.length) return {total:0,best:[],missingByIso:{},slotMembers:{}};
  const slotCounts={}, slotMembers={};
  members.forEach(m=>{
    (m.slots||[]).forEach(iso=>{
      slotCounts[iso]=(slotCounts[iso]||0)+1;
      slotMembers[iso]=slotMembers[iso]||[];
      slotMembers[iso].push(m.displayName);
    });
  });
  const total = members.length;
  const isoList = Object.keys(slotCounts);
  let best = isoList.filter(iso=>slotCounts[iso]===total).sort();
  let unanimous = best.length>0;
  if(!unanimous && isoList.length>0){
    const maxCount = Math.max(...isoList.map(iso=>slotCounts[iso]));
    best = isoList.filter(iso=>slotCounts[iso]===maxCount).sort();
  }
  const missingByIso={};
  best.forEach(iso=>{
    const present = new Set(slotMembers[iso]||[]);
    missingByIso[iso] = members.filter(m=>!present.has(m.displayName)).map(m=>m.displayName);
  });
  return {total, best, missingByIso, slotMembers, unanimous};
}

/* ---------------- actions ---------------- */
async function createRoom(){
  if(!initFirebase()){ session.view='setup'; render(); return; }
  const name = document.getElementById('cr-name').value.trim();
  const roomName = document.getElementById('cr-roomname').value.trim() || 'Team meeting';
  const hourStart = parseInt(document.getElementById('cr-start').value,10);
  const hourEnd = parseInt(document.getElementById('cr-end').value,10);
  const stepMinutes = parseInt(document.getElementById('cr-step').value,10);
  const startDateStr = document.getElementById('cr-startdate').value;
  let numDays = parseInt(document.getElementById('cr-numdays').value,10);
  if(!name){ session.err='Enter your name first.'; render(); return; }
  if(hourEnd<=hourStart){ session.err='End time must be after start time.'; render(); return; }
  if(!startDateStr){ session.err='Pick a starting date.'; render(); return; }
  if(!numDays || numDays<1) numDays=1;
  if(numDays>31) numDays=31;
  const startDate = parseISODate(startDateStr);
  const code = genCode();
  const meta = {
    code, roomName, hostName:name, startDate, numDays,
    hourStart, hourEnd, stepMinutes, createdAt:Date.now(),
    finalized:null, votingOptions:null, votes:{}
  };
  await ensureAuthReady();
  const ok = await saveMetaRaw(code, meta);
  if(!ok){ session.err='Could not reach Firebase. Double check your config and database rules.'; render(); return; }
  session.meta = meta; session.code = code; session.name = name;
  session.hourStart=hourStart; session.hourEnd=hourEnd; session.stepMinutes=stepMinutes;
  session.tz = document.getElementById('cr-tz').value;
  session.mySlots = new Set();
  session.err=''; session.view='dashboard';
  session.members = await loadMembers(code);
  render(); startLiveSync(code);
}
async function joinRoom(){
  if(!initFirebase()){ session.view='setup'; render(); return; }
  const name = document.getElementById('jn-name').value.trim();
  const code = document.getElementById('jn-code').value.trim().toUpperCase();
  if(!name || !code){ session.err='Enter your name and the room code.'; render(); return; }
  session.busy=true; render();
  await ensureAuthReady();
  const meta = await loadMeta(code);
  session.busy=false;
  if(!meta){ session.err='No room found with that code. Double check with your host.'; render(); return; }
  session.meta = meta; session.code = code; session.name = name;
  session.hourStart=meta.hourStart; session.hourEnd=meta.hourEnd; session.stepMinutes=meta.stepMinutes;
  // session.tz = document.getElementById('jn-tz').value;
  // session.members = await loadMembers(code);
  // const mine = session.members.find(m=>m.normKey===normName(name));
  // session.mySlots = new Set(mine? mine.slots : []);
  // if(mine && mine.tz) session.tz = mine.tz;
  session.tz = document.getElementById('jn-tz').value;
  session.members = await loadMembers(code);
  const mine = session.members.find(m=>m.normKey===normName(name));
  session.mySlots = new Set(mine? mine.slots : []);
  
  session.err=''; session.view='dashboard';
  render(); startLiveSync(code);
}
let dragState = {active:false, value:true};
function applySlot(iso, value, cellEl){
  if(value) session.mySlots.add(iso); else session.mySlots.delete(iso);
  if(cellEl) cellEl.classList.toggle('on', value);
}
function setupGridDragHandlers(){
  document.addEventListener('mousedown', e=>{
    const cell = e.target.closest('.slot-cell'); if(!cell) return;
    e.preventDefault();
    const iso = cell.dataset.iso;
    dragState.active = true;
    dragState.value = !session.mySlots.has(iso);
    document.body.classList.add('dragging');
    applySlot(iso, dragState.value, cell);
  });
  document.addEventListener('mouseover', e=>{
    if(!dragState.active) return;
    const cell = e.target.closest('.slot-cell'); if(!cell) return;
    applySlot(cell.dataset.iso, dragState.value, cell);
  });
  document.addEventListener('mouseup', ()=>{ dragState.active=false; document.body.classList.remove('dragging'); });
  document.addEventListener('touchstart', e=>{
    const cell = e.target.closest('.slot-cell'); if(!cell) return;
    const iso = cell.dataset.iso;
    dragState.active = true;
    dragState.value = !session.mySlots.has(iso);
    document.body.classList.add('dragging');
    applySlot(iso, dragState.value, cell);
  }, {passive:true});
  document.addEventListener('touchmove', e=>{
    if(!dragState.active) return;
    const touch = e.touches[0]; if(!touch) return;
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const cell = el && el.closest('.slot-cell'); if(!cell) return;
    e.preventDefault();
    applySlot(cell.dataset.iso, dragState.value, cell);
  }, {passive:false});
  document.addEventListener('touchend', ()=>{ dragState.active=false; document.body.classList.remove('dragging'); });
}
setupGridDragHandlers();
async function saveAvailability(){
  const normKey = normName(session.name);
  const ok = await saveMember(session.code, normKey, {
    normKey, displayName: session.name.trim(), tz: session.tz,
    slots: Array.from(session.mySlots), updatedAt: Date.now()
  });
  if(!ok){ showToast('Could not save — check your connection'); return; }
  session.members = await loadMembers(session.code);
  showToast('Availability saved ✓');
  if(!patchDashboard()) render();
}
async function refreshRoom(){
  if(!session.code) return;
  const meta = await loadMeta(session.code);
  const members = await loadMembers(session.code);
  if(meta) session.meta = meta;
  session.members = members;
  if(!patchDashboard()) render();
}
async function beginVoteOrFinalize(){
  const {best, unanimous} = computeBest(session.members);
  if(best.length===0){ showToast('No one has submitted availability yet.'); return; }
  if(best.length===1){
    await finalizeSlot(best[0], unanimous?'unanimous':'best availability');
    return;
  }
  await updateMeta(session.code, meta=>{
    meta.votingOptions = best; meta.votes = {}; meta.finalized=null; return meta;
  });
  session.meta = await loadMeta(session.code);
  showToast('Tied — starting a vote');
  if(!patchDashboard()) render();
}
async function castVote(iso){
  const normKey = normName(session.name);
  await updateMeta(session.code, meta=>{
    if(!meta.votes) meta.votes={};
    meta.votes[normKey]=iso; return meta;
  });
  session.meta = await loadMeta(session.code);
  showToast('Vote recorded');
  if(!patchDashboard()) render();
}
async function finalizeVote(){
  const meta = await loadMeta(session.code);
  const votes = meta.votes||{};
  const tally={};
  Object.values(votes).forEach(iso=>{ tally[iso]=(tally[iso]||0)+1; });
  const options = meta.votingOptions||[];
  if(options.length===0){ showToast('No voting options set.'); return; }
  let winner = options[0], winnerCount=-1;
  options.forEach(iso=>{ const c=tally[iso]||0; if(c>winnerCount){winner=iso;winnerCount=c;} });
  const {missingByIso} = computeBest(session.members);
  await finalizeSlot(winner, 'vote', missingByIso[winner]||[]);
}
async function finalizeSlot(iso, method, missingOverride){
  const {missingByIso} = computeBest(session.members);
  const missing = missingOverride || missingByIso[iso] || [];
  await updateMeta(session.code, meta=>{
    meta.finalized = {slotISO:iso, decidedAt:Date.now(), method, missing};
    meta.votingOptions=null; meta.votes={};
    return meta;
  });
  session.meta = await loadMeta(session.code);
  showToast('Meeting time confirmed 🎉');
  if(!patchDashboard()) render();
}
function copyCode(){
  try{ navigator.clipboard.writeText(session.code); showToast('Room code copied'); }catch(e){ showToast('Code: '+session.code); }
}
function goHome(){
  stopLiveSync();
  session = {view:'home', name:'', code:'', tz:detectedTz, meta:null, members:[], mySlots:new Set(), hourStart:8, hourEnd:20, stepMinutes:60, roomName:'', err:'', busy:false};
  render();
}

/* ---------------- render ---------------- */
function tzOptions(selected){
  return TIMEZONES.map(t=>`<option value="${t.tz}" ${t.tz===selected?'selected':''}>${t.label}</option>`).join('');
}
function render(){
  const app = document.getElementById('app');
  if(session.view==='setup') app.innerHTML = renderSetup();
  else if(session.view==='home') app.innerHTML = renderHome();
  else if(session.view==='create') app.innerHTML = renderCreate();
  else if(session.view==='join') app.innerHTML = renderJoin();
  else if(session.view==='dashboard') app.innerHTML = renderDashboard();
}
function showToast(msg){
  const old = document.getElementById('toast-el'); if(old) old.remove();
  const t = document.createElement('div'); t.id='toast-el'; t.className='toast'; t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.remove(); }, 2200);
}
function brandHeader(){
  return `<div class="brand-row"><span class="brand-dot"></span><span class="brand">Huddle</span></div>`;
}
function renderSetup(){
  const rulesJSON = `{\n  "rules": {\n    "rooms": {\n      ".read": "auth != null",\n      ".write": "auth != null"\n    }\n  }\n}`;
  return `<div class="view">
    ${brandHeader()}
    <p class="tagline">One-time setup — connect this file to your own free Firebase project so it works for everyone, no Claude account involved.</p>
    <div class="card">
      <span class="badge-warn">⚙ Setup needed</span>
      <h2>Connect Firebase (free, ~5 minutes)</h2>
      <p class="sub">You only do this once. After this, share the file/link with your group and they just use it.</p>

      <div class="step"><span class="step-num">1</span><div class="step-body">
        Go to <b>console.firebase.google.com</b> and sign in with any Google account. Click <b>Add project</b>, give it any name, and finish the wizard (you can skip Google Analytics).
      </div></div>

      <div class="step"><span class="step-num">2</span><div class="step-body">
        In your new project, open <b>Build → Realtime Database</b> in the left sidebar, click <b>Create Database</b>, pick any region, and choose <b>Start in test mode</b>.
      </div></div>

      <div class="step"><span class="step-num">3</span><div class="step-body">
        Still in Realtime Database, click the <b>Rules</b> tab and replace the contents with this, then click <b>Publish</b>:
        <div class="codeblock">${rulesJSON}</div>
        <span class="helptext">This requires a signed-in request (any signed-in request — see step 4) rather than being open to anyone on the internet, which protects against automated scanners that scrape public repos for open Firebase databases.</span>
      </div></div>

      <div class="step"><span class="step-num">4</span><div class="step-body">
        Open <b>Build → Authentication → Get started</b>, click the <b>Sign-in method</b> tab, click <b>Anonymous</b>, and toggle it <b>Enable</b>. This lets the app quietly sign everyone in behind the scenes — no login screen, nothing your friends will ever see or need to do.
      </div></div>

      <div class="step"><span class="step-num">5</span><div class="step-body">
        Click the <b>gear icon → Project settings</b>, scroll to <b>Your apps</b>, click the <b>&lt;/&gt; (web)</b> icon, give the app any nickname, and register it. Firebase shows you a code block starting with <code>const firebaseConfig = {...}</code>.
      </div></div>

      <div class="step"><span class="step-num">6</span><div class="step-body">
        Open this HTML file in a text editor, find the section near the top marked <b>FIREBASE SETUP</b>, and paste your copied values in — replacing the <code>YOUR_...</code> placeholders. Save the file.
      </div></div>

      <div class="step"><span class="step-num">7</span><div class="step-body">
        Re-open the file (or push it to GitHub Pages and reload the page). This screen will disappear on its own once it detects a real config.
      </div></div>

      <div style="margin-top:16px;"><button class="btn-primary" onclick="location.reload()">I've added my config — reload</button></div>
    </div>
  </div>`;
}
function renderHome(){
  return `<div class="view">
    ${brandHeader()}
    <p class="tagline">Find a meeting time that works for everyone — across every timezone.</p>
    <div class="choice-grid">
      <div class="choice" onclick="session.view='create';session.err='';render()">
        <div class="ico">🌸</div><div class="t">Create a room</div>
        <div class="d">Set up a room and get a code to share with your group</div>
      </div>
      <div class="choice" onclick="session.view='join';session.err='';render()">
        <div class="ico">🔑</div><div class="t">Join a room</div>
        <div class="d">Enter your name and the room code from your host</div>
      </div>
    </div>
    <div class="helptext" style="margin-top:18px;">No sign-up needed — for anyone. Your name plus the room code is all you need. Come back anytime to check the room or edit your availability.</div>
  </div>`;
}
function renderCreate(){
  return `<div class="view">
    ${brandHeader()}
    <div class="card">
      <h2>Create a room</h2>
      <p class="sub">You'll get a short code — share it with your group so they can join.</p>
      <label>Your name</label>
      <input type="text" id="cr-name" placeholder="e.g. Nayan">
      <label>What's this meeting about? <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
      <input type="text" id="cr-roomname" placeholder="e.g. Officer Meeting">
      <label>Your timezone</label>
      <select id="cr-tz">${tzOptions(detectedTz)}</select>
      <label>Starting date</label>
      <input type="date" id="cr-startdate" value="${todayISODate()}">
      <label>Number of days to consider</label>
      <input type="number" id="cr-numdays" value="7" min="1" max="31" step="1">
      <div class="helptext">Pick the window of days your group should consider — starting from this date, for this many days.</div>
      <label>Availability window to collect</label>
      <div class="row2">
        <select id="cr-start">${[6,7,8,9,10].map(h=>`<option value="${h}" ${h===8?'selected':''}>${h}:00</option>`).join('')}</select>
        <select id="cr-end">${[16,17,18,19,20,21,22].map(h=>`<option value="${h}" ${h===20?'selected':''}>${h}:00</option>`).join('')}</select>
      </div>
      <div class="helptext">Start / end time, shown in your own local timezone. Everyone else will see it converted to theirs.</div>
      <label>Time slot size</label>
      <select id="cr-step"><option value="60">1 hour</option><option value="30">30 minutes</option></select>
      ${session.err?`<div class="msg-err">${session.err}</div>`:''}
      <div style="margin-top:18px;"><button class="btn-primary" onclick="createRoom()">Create room</button></div>
      <div style="margin-top:10px;"><button class="btn-ghost" onclick="session.view='home';render()">← Back</button></div>
    </div>
  </div>`;
}
function renderJoin(){
  return `<div class="view">
    ${brandHeader()}
    <div class="card">
      <h2>Join a room</h2>
      <p class="sub">Use the same name each time so Huddle recognizes you — capitalization doesn't matter.</p>
      <label>Your name</label>
      <input type="text" id="jn-name" placeholder="e.g. Nayan" value="${session.name}">
      <label>Room code</label>
      <input type="text" id="jn-code" placeholder="e.g. K7QX2M" style="text-transform:uppercase;letter-spacing:.06em;" value="${session.code}">
      <label>Your timezone</label>
      <select id="jn-tz">${tzOptions(detectedTz)}</select>
      ${session.err?`<div class="msg-err">${session.err}</div>`:''}
      <div style="margin-top:18px;"><button class="btn-primary" onclick="joinRoom()" ${session.busy?'disabled':''}>${session.busy?'Looking for room…':'Join room'}</button></div>
      <div style="margin-top:10px;"><button class="btn-ghost" onclick="session.view='home';render()">← Back</button></div>
    </div>
  </div>`;
}
function buildGridHTML(){
  const meta = session.meta;
  const {y,m,d} = meta.startDate;
  const numDays = meta.numDays || 7;
  const cols = Array.from({length:numDays}, (_,i)=>{
    const ymd = addDaysToYMD(y,m,d,i);
    const dateObj = new Date(Date.UTC(ymd.y,ymd.m-1,ymd.d,12));
    const label = new Intl.DateTimeFormat(undefined,{weekday:'short'}).format(dateObj);
    const dateLabel = new Intl.DateTimeFormat(undefined,{month:'short',day:'numeric'}).format(dateObj);
    return {label, dateLabel, ymd};
  });
  const rows = [];
  for(let totalMin=meta.hourStart*60; totalMin<meta.hourEnd*60; totalMin+=meta.stepMinutes){
    const hour = Math.floor(totalMin/60), minute = totalMin%60;
    rows.push({hour,minute});
  }
  let thead = '<tr><th></th>'+cols.map(c=>`<th>${c.label}<br><span style="font-weight:400">${c.dateLabel}</span></th>`).join('')+'</tr>';
  let body = rows.map(r=>{
    const timeLabel = new Date(2000,0,1,r.hour,r.minute).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    let cells = cols.map(c=>{
      const iso = localToUTCISO(c.ymd.y,c.ymd.m,c.ymd.d,r.hour,r.minute,session.tz);
      const on = session.mySlots.has(iso);
      return `<td><div class="slot-cell ${on?'on':''}" data-iso="${iso}"></div></td>`;
    }).join('');
    return `<tr><td class="hourlabel">${timeLabel}</td>${cells}</tr>`;
  }).join('');
  return `<div class="grid-wrap"><table class="slotgrid" style="min-width:${Math.max(560, 78*numDays)}px"><thead>${thead}</thead><tbody>${body}</tbody></table></div>
  <div class="legend"><span><span class="sw" style="background:var(--pink-soft2);border:1px solid var(--pink-line)"></span>Free</span>
  <span><span class="sw" style="background:var(--pink)"></span>Selected</span></div>`;
}
function bannerFragment(){
  const meta = session.meta;
  if(!meta.finalized) return '';
  const f = meta.finalized;
  return `<div class="banner">
    <div class="lbl">📅 Upcoming meeting · ${meta.roomName}</div>
    <div class="time">${formatLocal(f.slotISO, session.tz)} <span style="font-weight:400;font-size:13px;opacity:.85">(${tzLabel(session.tz)})</span></div>
    ${f.missing && f.missing.length? `<div class="miss">Can't make it: ${f.missing.join(', ')}</div>` : `<div class="miss">Everyone's confirmed available ✓</div>`}
  </div>`;
}
function votingFragment(){
  const meta = session.meta;
  if(meta.finalized || !meta.votingOptions || !meta.votingOptions.length) return '';
  const votes = meta.votes||{};
  const tally={}; Object.values(votes).forEach(iso=>tally[iso]=(tally[iso]||0)+1);
  const myVote = votes[normName(session.name)];
  return `<div class="card">
    <h2>It's a tie — vote for a time 🗳️</h2>
    <p class="sub">Several times work for the same number of people. Pick your favorite below.</p>
    ${meta.votingOptions.map(iso=>`
      <div class="radio-row ${myVote===iso?'checked':''}" onclick="castVote('${iso}')">
        <div class="radio-dot"></div>
        <div>${formatLocal(iso, session.tz)}</div>
        <div class="vote-tally">${tally[iso]||0} vote${(tally[iso]||0)===1?'':'s'}</div>
      </div>`).join('')}
    <div style="margin-top:12px;"><button class="btn-secondary" onclick="finalizeVote()">Finalize with current votes</button></div>
  </div>`;
}
function resultsFragment(){
  const meta = session.meta;
  if(meta.finalized || meta.votingOptions) return '';
  const best = computeBest(session.members);
  if(best.best.length===0){
    return `<div class="card"><h2>Best times</h2><p class="sub">No one has submitted availability yet — fill in the grid below to get started.</p></div>`;
  }
  const rowsHTML = best.best.map(iso=>{
    const missing = best.missingByIso[iso]||[];
    return `<div class="result-row">
      <div><div class="rt">${formatLocal(iso, session.tz)}</div>
      <div class="rm">${missing.length? `Can't make it: ${missing.join(', ')}` : 'Everyone can make it'}</div></div>
      <div class="rc">${best.total-missing.length}/${best.total}</div>
    </div>`;
  }).join('');
  const tieNote = best.best.length>1? `<div class="helptext">${best.best.length} times are tied — confirming will start a vote.</div>`:'';
  return `<div class="card">
    <h2>Best times</h2>
    <p class="sub">${best.unanimous? 'Everyone is free at these times 🎉' : "No time works for everyone yet — here's the closest match:"}</p>
    ${rowsHTML}
    ${tieNote}
    <div style="margin-top:10px;"><button class="btn-primary" onclick="beginVoteOrFinalize()">${best.best.length>1? 'Start vote' : 'Confirm this time'}</button></div>
  </div>`;
}
function membersFragment(){
  return session.members.length? session.members.map(m=>`
    <li><span class="check">✓</span><span class="member-name">${m.displayName}</span><span class="member-tz">${tzLabel(m.tz)}</span></li>
  `).join('') : `<li style="color:var(--muted)">No one has responded yet — be the first!</li>`;
}
// Patch only the sections that show shared/live data, without touching the
// grid, timezone picker, or any open inputs — this is what avoids the blink,
// and is also what the realtime Firebase listener calls on every update.
let lastFragmentCache = {banner:null, voting:null, results:null, members:null};
function patchDashboard(){
  const bannerEl = document.getElementById('banner-holder');
  const votingEl = document.getElementById('voting-holder');
  const resultsEl = document.getElementById('results-holder');
  const membersEl = document.getElementById('members-list');
  const membersCountEl = document.getElementById('members-count');
  if(!bannerEl || !votingEl || !resultsEl || !membersEl) return false; // not on dashboard yet
  const b = bannerFragment(), v = votingFragment(), r = resultsFragment(), m = membersFragment();
  if(b !== lastFragmentCache.banner){ bannerEl.innerHTML = b; lastFragmentCache.banner = b; }
  if(v !== lastFragmentCache.voting){ votingEl.innerHTML = v; lastFragmentCache.voting = v; }
  if(r !== lastFragmentCache.results){ resultsEl.innerHTML = r; lastFragmentCache.results = r; }
  if(m !== lastFragmentCache.members){ membersEl.innerHTML = m; lastFragmentCache.members = m; }
  if(membersCountEl) membersCountEl.textContent = session.members.length;
  return true;
}
function renderDashboard(){
  const meta = session.meta;
  const iSubmitted = session.members.some(m=>m.normKey===normName(session.name));
  lastFragmentCache = {banner:bannerFragment(), voting:votingFragment(), results:resultsFragment(), members:membersFragment()};

  return `<div class="view">
    <div class="top-bar">
      <div>
        ${brandHeader()}
        <div style="font-size:15px;font-weight:600;margin-top:2px;">${meta.roomName}</div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
          <span class="code-pill">${session.code}</span>
          <button class="btn-ghost small-btn" onclick="copyCode()">Copy</button>
        </div>
      </div>
      <button class="btn-ghost small-btn" onclick="goHome()">Leave room</button>
    </div>

    <div id="banner-holder">${lastFragmentCache.banner}</div>
    <div id="voting-holder">${lastFragmentCache.voting}</div>
    <div id="results-holder">${lastFragmentCache.results}</div>

    <div class="card">
      <h2>Who's responded (<span id="members-count">${session.members.length}</span>)</h2>
      <ul class="member-list" id="members-list">${lastFragmentCache.members}</ul>
      <div style="margin-top:12px;"><button class="btn-ghost small-btn" onclick="refreshRoom()">↻ Refresh</button></div>
    </div>

    <div class="card">
      <h2>${iSubmitted? 'Edit your availability' : 'Add your availability'}</h2>
      <p class="sub">Signed in as <b>${session.name}</b> · <a class="linklike" onclick="openTzPicker()">${tzLabel(session.tz)}</a> — click cells to select the times you're free.</p>
      <div id="tz-picker-holder"></div>
      <div id="grid-holder">${buildGridHTML()}</div>
      <div style="margin-top:14px;"><button class="btn-primary" onclick="saveAvailability()">Save my availability</button></div>
    </div>
  </div>`;
}
function openTzPicker(){
  const holder = document.getElementById('tz-picker-holder');
  if(!holder) return;
  if(holder.innerHTML){ holder.innerHTML=''; return; }
  holder.innerHTML = `<select id="dash-tz" onchange="changeTz(this.value)" style="margin-bottom:12px;">${tzOptions(session.tz)}</select>`;
}
function changeTz(tz){ session.tz = tz; render(); }

render();
</script>
